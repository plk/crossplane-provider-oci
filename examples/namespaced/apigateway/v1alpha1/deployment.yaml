---
apiVersion: apigateway.oci.m.upbound.io/v1alpha1
kind: Deployment
metadata:
  labels:
    testing.upbound.io/example-name: deployment_label_1
  name: deployment1
  namespace: crossplane-system
spec:
  forProvider:
    compartmentIdSelector:
      matchLabels:
        testing.upbound.io/example-name: compartment_label_1
    displayName: deployment1
    gatewayIdSelector:
      matchLabels:
        testing.upbound.io/example-name: gateway_label_1
    pathPrefix: /api
    specification:
    - routes:
      - backend:
        - type: HTTP_BACKEND
          url: https://example.com
        methods:
        - GET
        path: /
