---
apiVersion: database.oci.m.upbound.io/v1alpha1
kind: Database
metadata:
  annotations:
    meta.upbound.io/example-id: database/v1alpha1/database
  labels:
    testing.upbound.io/example-name: primary_database
  name: primary-database
  namespace: crossplane-system
spec:
  forProvider:
    database:
    - adminPasswordSecretRef:
        key: example-key
        name: example-secret
        namespace: upbound-system
      characterSet: AL32UTF8
      dbName: PrimDb
      dbWorkload: OLTP
      ncharacterSet: AL16UTF16
    dbHomeIdSelector:
      matchLabels:
        testing.upbound.io/example-name: test_db_home
    source: NONE
---
apiVersion: networking.oci.m.upbound.io/v1alpha1
kind: InternetGateway
metadata:
  annotations:
    meta.upbound.io/example-id: database/v1alpha1/database
  labels:
    testing.upbound.io/example-name: t
  name: t
  namespace: crossplane-system
spec:
  forProvider:
    compartmentIdSelector:
      matchLabels:
        testing.upbound.io/example-name: example
    displayName: -tf-internet-gateway
    vcnIdSelector:
      matchLabels:
        testing.upbound.io/example-name: t
---
apiVersion: networking.oci.m.upbound.io/v1alpha1
kind: RouteTable
metadata:
  annotations:
    meta.upbound.io/example-id: database/v1alpha1/database
  labels:
    testing.upbound.io/example-name: t
  name: t
  namespace: crossplane-system
spec:
  forProvider:
    compartmentIdSelector:
      matchLabels:
        testing.upbound.io/example-name: example
    routeRules:
    - cidrBlock: 0.0.0.0/0
      networkEntityIdSelector:
        matchLabels:
          testing.upbound.io/example-name: t
    vcnIdSelector:
      matchLabels:
        testing.upbound.io/example-name: t
---
apiVersion: networking.oci.m.upbound.io/v1alpha1
kind: Subnet
metadata:
  annotations:
    meta.upbound.io/example-id: database/v1alpha1/database
  labels:
    testing.upbound.io/example-name: t
  name: t
  namespace: crossplane-system
spec:
  forProvider:
    availabilityDomain: ${data.oci_identity_availability_domains.ADs.availability_domains.0.name}
    cidrBlock: 10.1.20.0/24
    compartmentIdSelector:
      matchLabels:
        testing.upbound.io/example-name: example
    dhcpOptionsIdSelector:
      matchLabels:
        testing.upbound.io/example-name: t
    displayName: TFSubnet1
    dnsLabel: tfsubnet
    routeTableIdSelector:
      matchLabels:
        testing.upbound.io/example-name: t
    securityListIdRefs:
    - name: t
    vcnIdSelector:
      matchLabels:
        testing.upbound.io/example-name: t
---
apiVersion: networking.oci.m.upbound.io/v1alpha1
kind: Subnet
metadata:
  annotations:
    meta.upbound.io/example-id: database/v1alpha1/database
  labels:
    testing.upbound.io/example-name: test_subnet_backup
  name: test-subnet-backup
  namespace: crossplane-system
spec:
  forProvider:
    availabilityDomain: ${data.oci_identity_availability_domain.ad.name}
    cidrBlock: 10.1.23.0/24
    compartmentIdSelector:
      matchLabels:
        testing.upbound.io/example-name: example
    dhcpOptionsIdSelector:
      matchLabels:
        testing.upbound.io/example-name: t
    displayName: ExadataBackupSubnet
    dnsLabel: subnetexadata2
    routeTableIdSelector:
      matchLabels:
        testing.upbound.io/example-name: t
    securityListIdRefs:
    - name: t
    vcnIdSelector:
      matchLabels:
        testing.upbound.io/example-name: t
---
apiVersion: core.oci.m.upbound.io/v1alpha1
kind: VirtualNetwork
metadata:
  annotations:
    meta.upbound.io/example-id: database/v1alpha1/database
  labels:
    testing.upbound.io/example-name: t
  name: t
  namespace: crossplane-system
spec:
  forProvider:
    cidrBlock: 10.1.0.0/16
    compartmentIdSelector:
      matchLabels:
        testing.upbound.io/example-name: example
    displayName: -tf-vcn
    dnsLabel: tfvcn
---
apiVersion: database.oci.m.upbound.io/v1alpha1
kind: DbHome
metadata:
  annotations:
    meta.upbound.io/example-id: database/v1alpha1/database
  labels:
    testing.upbound.io/example-name: test_db_home
  name: test-db-home
  namespace: crossplane-system
spec:
  forProvider:
    dbSystemId: ${oci_database_cloud_vm_cluster.test_cloud_vm_cluster.id}
    dbVersion: 19.26.0.0
    displayName: createdDbHomeNone
    source: NONE
