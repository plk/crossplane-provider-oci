---
apiVersion: loadbalancer.oci.m.upbound.io/v1alpha1
kind: LoadBalancer
metadata:
  labels:
    testing.upbound.io/example-name: loadbalancer_label_1
  name: loadbalancer1
  namespace: crossplane-system
spec:
  forProvider:
    compartmentIdSelector:
      matchLabels:
        testing.upbound.io/example-name: compartment_label_1
    displayName: loadbalancer1
    shape: flexible
    shapeDetails:
    - maximumBandwidthInMbps: 10
      minimumBandwidthInMbps: 10
    subnetIdsSelector:
      matchLabels:
        testing.upbound.io/example-name: subnet_label_1
