apiVersion: generativeai.oci.m.upbound.io/v1alpha1
kind: AgentProvisionedCapacity
metadata:
  annotations:
    meta.upbound.io/example-id: generativeai/v1alpha1/agentprovisionedcapacity
  labels:
    testing.upbound.io/example-name: test_provisioned_capacity
  name: test-provisioned-capacity
  namespace: upbound-system
spec:
  forProvider:
    compartmentIdSelector:
      matchLabels:
        testing.upbound.io/example-name: example
    definedTags:
      Operations.CostCenter: "42"
    description: ${var.provisioned_capacity_description}
    displayName: ${var.provisioned_capacity_display_name}
    freeformTags:
      Department: Finance
    numberOfUnits: ${var.provisioned_capacity_number_of_units}
